name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Lint & test (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 20_code
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Type check
        run: mypy . || true   # non-blocking until typing is complete

      - name: Tests
        run: pytest

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: python
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push)
        run: docker build -f 20_code/30_docker/Dockerfile -t semesterthesis:ci 20_code
