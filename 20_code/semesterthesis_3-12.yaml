# Conda environment specification for the semester thesis (Python 3.12).
#
# Create / update the environment (run from 20_code/):
#   conda env update --file semesterthesis_3-12.yaml --prune
#   conda activate semesterthesis_3-12
#
# Python packages are pip-managed so the environment stays byte-identical to the
# pip-based Docker image. Keep this file, requirements.txt and
# requirements-dev.txt in sync with the live environment.
name: semesterthesis_3-12
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
      # runtime (mirrors requirements.txt)
      - fastapi==0.137.1
      - uvicorn[standard]==0.49.0
      - pydantic-settings==2.14.1
      - python-dotenv==1.2.2
      - numpy==2.4.6
      - scipy==1.17.1
      - pandas==3.0.3
      - matplotlib==3.11.0
      # development / CI (mirrors requirements-dev.txt)
      - pytest==9.1.0
      - httpx==0.28.1
      - ruff==0.15.17
      - mypy==2.1.0
      - pre-commit==4.6.0
